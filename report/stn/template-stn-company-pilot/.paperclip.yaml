company:
  requireBoardApprovalForNewAgents: true
publicSector:
  visualIdentity:
    schemaVersion: "stn-visual-identity/v1"
    source:
      document: "Manual de Identidade Visual da Secretaria do Tesouro Nacional"
      edition: "3ª Edição"
      publishedAt: "2016-05-16"
      referenceFile: "Manual_de_Identidade_Visual.pdf"
    governance:
      ownerUnit: "CODIN"
      contactEmail: "geifo.codin.df.stn@tesouro.gov.br"
      approvalRequiredForPromotionalMaterials: true
    branding:
      logo:
        allowedOrientations:
          - "vertical"
          - "horizontal"
        allowedVariants:
          - "color"
          - "negative"
          - "black_white"
          - "outlined"
        minimumBody: 10
        preserveProportions: true
      colors:
        yellow:
          pantone: "116"
          pantoneMattePaper: "115"
          cmyk:
            c: 0
            m: 15
            y: 94
            k: 0
          rgb:
            r: 255
            g: 213
            b: 0
        green:
          pantone: "362"
          cmyk:
            c: 76
            m: 0
            y: 100
            k: 11
          rgb:
            r: 50
            g: 156
            b: 50
        blue:
          pantone: "287"
          cmyk:
            c: 100
            m: 69
            y: 0
            k: 11
          rgb:
            r: 0
            g: 74
            b: 147
      typography:
        institutional:
          - "Frutiger Roman"
          - "Frutiger Bold"
          - "Frutiger Roman Italic"
          - "Frutiger Bold Italic"
        documentsSuggested:
          - "Calibri"
tasks:
  plano-competencias-suafi:
    priority: "high"
    executionPolicy:
      mode: "normal"
      commentRequired: true
      stages:
        - type: "review"
          approvalsNeeded: 1
          participants:
            - type: "user"
              userId: "suafi.revisor@tesouro.gov.br"
        - type: "approval"
          approvalsNeeded: 1
          participants:
            - type: "user"
              userId: "suafi.subsecretario@tesouro.gov.br"
    metadata:
      publicSector:
        unitSigla: "SUAFI"
        unitNome: "Subsecretaria de Administração Financeira Federal"
        competencyRef: "SUAFI:I"
        governanceClass: "ato_critico"
        auditTrailRequired: true
        source: "regimento_stn_20260415"
        governanceParticipants:
          reviewerUserId: "suafi.revisor@tesouro.gov.br"
          approverUserId: "suafi.subsecretario@tesouro.gov.br"
        operationalIndicators:
          - id: "prazo-medio-conclusao-dias"
            name: "Prazo médio de conclusão (dias)"
            periodicity: "mensal"
            formula: "media_dias(data_conclusao - data_abertura)"
          - id: "taxa-conclusao-no-prazo"
            name: "Taxa de conclusão no prazo (%)"
            periodicity: "mensal"
            formula: "tarefas_concluidas_no_prazo / tarefas_concluidas * 100"
          - id: "taxa-retrabalho"
            name: "Taxa de retrabalho (%)"
            periodicity: "mensal"
            formula: "tarefas_reabertas / tarefas_concluidas * 100"
          - id: "conformidade-execucao-financeira"
            name: "Conformidade da execução financeira (%)"
            periodicity: "mensal"
            formula: "eventos_conformes / eventos_total * 100"
